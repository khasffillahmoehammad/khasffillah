<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PL-DIOS | Notifications</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="/distributor-shell.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f4f7fb}
.sidebar{width:260px;height:100vh;position:fixed;left:0;top:0;background:linear-gradient(180deg,#0046ad 0%,#0066cc 20%,#00a651 70%,#008f6b 100%);color:white;padding:25px 20px;box-shadow:5px 0 25px rgba(0,0,0,.15)}
.logo{text-align:center;margin-bottom:35px}.logo h2{font-size:34px;font-weight:800}.logo p{font-size:12px;opacity:.9}
.menu-title{font-size:12px;opacity:.8;margin-bottom:10px;text-transform:uppercase}.sidebar-menu{list-style:none;padding-left:0}.sidebar-menu li{margin-bottom:10px}
.sidebar-menu a{display:flex;align-items:center;gap:12px;text-decoration:none;color:white;padding:14px 16px;border-radius:14px;font-weight:500}.sidebar-menu a:hover,.sidebar-menu .active{background:rgba(255,255,255,.18)}
.main-content{margin-left:260px;padding:30px}.topbar,.card-box{background:white;border-radius:18px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.05);margin-bottom:24px}
.topbar{display:flex;justify-content:space-between;align-items:center}.topbar h3{color:#003366;font-weight:700;margin:0}.notif-item{border-bottom:1px solid #edf1f7;padding:16px 0}.notif-item:last-child{border-bottom:none}
.badge-soft{display:inline-block;border-radius:20px;background:#eef4ff;color:#0046ad;font-weight:700;font-size:12px;padding:6px 10px}
@media(max-width:992px){.sidebar{position:relative;width:100%;height:auto}.main-content{margin-left:0}}
</style>
</head>
<body class="pldios-distributor">
<div class="sidebar">
  <div class="logo"><h2>PL-DIOS</h2><p>Distributor Integrated Ordering System</p></div>
  <div class="menu-title">Main Menu</div>
  <ul class="sidebar-menu">
    <li><a href="/menu%20utama.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
    <li><a href="/create%20order.html"><i class="fas fa-cart-plus"></i> Create Order</a></li>
    <li><a href="/confirm%20order.html"><i class="fas fa-file-alt"></i> Order History</a></li>
    <li><a href="/notifications.html"><i class="fas fa-bell"></i> Notifications</a></li>
    <li><a href="/profile.html"><i class="fas fa-user"></i> Profile</a></li>
    <li><a href="#" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Logout</a></li>
  </ul>
</div>

<div class="main-content">
  <div class="topbar">
    <div>
      <h3>Notifications</h3>
      <p class="mb-0 text-muted">Update terbaru dari PO dan QT distributor.</p>
    </div>
    <strong id="userName">Distributor User</strong>
  </div>
  <div class="card-box" id="notificationList"></div>
</div>

<script src="/pldios-api.js"></script>
<script>
async function loadNotifications(){
  const context = await getDistributorContext();
  if(!context) return;
  applyDistributorIdentity(context);

  const data = await apiRequest(`/api/orders?role=${context.user.role}&userId=${context.user.id}`);
  const notifications = data.orders
    .slice()
    .reverse()
    .map((order) => {
      if(order.status === "qt_uploaded"){
        return { title: `${order.poNumber} sudah memiliki QT`, detail: `Nominal ${formatCurrency(order.quotation?.amount)}. Silakan upload bukti bayar.`, tag: "QT" };
      }
      if(order.status === "payment_uploaded"){
        return { title: `${order.poNumber} menunggu verifikasi pembayaran`, detail: order.paymentProof?.fileName || "Bukti bayar sudah diupload.", tag: "Payment" };
      }
      if(order.status === "completed"){
        return { title: `${order.poNumber} selesai`, detail: "Order sudah selesai diproses.", tag: "Done" };
      }
      return { title: `${order.poNumber} menunggu review`, detail: "PO sudah dikirim ke Admin Pertamina.", tag: "PO" };
    });

  document.getElementById("notificationList").innerHTML = notifications.map((item) => `
    <div class="notif-item">
      <span class="badge-soft">${item.tag}</span>
      <h6 class="fw-bold mt-2 mb-1">${item.title}</h6>
      <p class="mb-0 text-muted">${item.detail}</p>
    </div>
  `).join("");
}

loadNotifications().catch((error) => alert(error.message));
</script>
</body>
</html>
