<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PL-DIOS | Distributor Profile</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="/distributor-shell.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f4f7fb}
.sidebar{width:260px;height:100vh;position:fixed;left:0;top:0;background:linear-gradient(180deg,#0046ad 0%,#0066cc 20%,#00a651 70%,#008f6b 100%);color:white;padding:25px 20px;box-shadow:5px 0 25px rgba(0,0,0,.15)}
.logo{text-align:center;margin-bottom:35px}.logo h2{font-size:34px;font-weight:800}.logo p{font-size:12px;opacity:.9}
.menu-title{font-size:12px;opacity:.8;margin-bottom:10px;text-transform:uppercase}.sidebar-menu{list-style:none;padding-left:0}.sidebar-menu li{margin-bottom:10px}
.sidebar-menu a{display:flex;align-items:center;gap:12px;text-decoration:none;color:white;padding:14px 16px;border-radius:14px;font-weight:500}.sidebar-menu a:hover,.sidebar-menu .active{background:rgba(255,255,255,.18)}
.main-content{margin-left:260px;padding:30px}.topbar,.card-box{background:white;border-radius:18px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.05);margin-bottom:24px}
.topbar{display:flex;justify-content:space-between;align-items:center}.topbar h3{color:#003366;font-weight:700;margin:0}
.form-label{font-weight:600}.form-control{height:50px;border-radius:14px}.preview{width:120px;height:120px;border:1px dashed #ccd3df;border-radius:14px;object-fit:contain;background:#f8fafc;padding:8px}
.btn-main{border:none;padding:14px 22px;border-radius:14px;background:linear-gradient(90deg,#0046ad,#00a651);color:white;font-weight:700}
.hint{color:#667085;font-size:14px}
@media(max-width:992px){.sidebar{position:relative;width:100%;height:auto}.main-content{margin-left:0}}
</style>
</head>
<body class="pldios-distributor">
<div class="sidebar">
  <div class="logo"><h2>PL-DIOS</h2><p>Distributor Integrated Ordering System</p></div>
  <div class="menu-title">Main Menu</div>
  <ul class="sidebar-menu">
    <li><a href="/menu%20utama.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
    <li><a href="/create%20order.html"><i class="fas fa-cart-plus"></i> Create Order</a></li>
    <li><a href="/confirm%20order.html"><i class="fas fa-file-alt"></i> Order History</a></li>
    <li><a href="/notifications.html"><i class="fas fa-bell"></i> Notifications</a></li>
    <li><a href="/profile.html"><i class="fas fa-user"></i> Profile</a></li>
    <li><a href="#" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Logout</a></li>
  </ul>
</div>
<div class="main-content">
  <div class="topbar">
    <div>
      <h3>Distributor Profile</h3>
      <p class="mb-0 text-muted">Data ini dipakai untuk cetak PDF PO dan evidence proses Pertamina.</p>
    </div>
    <strong id="profileStatus">Incomplete</strong>
  </div>

  <form class="card-box" id="profileForm">
    <div class="row g-4">
      <div class="col-md-6">
        <label class="form-label">Nama Distributor</label>
        <input class="form-control" id="distributorName" placeholder="Contoh: PT Distro Medan Jaya" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Alamat Distributor</label>
        <input class="form-control" id="address" placeholder="Alamat lengkap distributor" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Upload Logo Distro</label>
        <input type="file" class="form-control" id="logo" accept="image/*">
        <div class="hint mt-2" id="logoName">Belum ada logo.</div>
        <img class="preview mt-3" id="logoPreview" alt="Logo preview">
      </div>
      <div class="col-md-6">
        <label class="form-label">Upload Foto Stempel</label>
        <input type="file" class="form-control" id="stamp" accept="image/*">
        <div class="hint mt-2" id="stampName">Belum ada stempel.</div>
        <img class="preview mt-3" id="stampPreview" alt="Stamp preview">
      </div>
    </div>
    <button class="btn-main mt-4" type="submit"><i class="fas fa-save"></i> Simpan Profile</button>
  </form>
</div>

<script src="/pldios-api.js"></script>
<script>
let currentProfile = null;

async function loadProfile(){
  const user = requireLogin();
  if(!user) return;

  const data = await apiRequest(`/api/profile?userId=${user.id}`);
  currentProfile = data.profile || {};
  applyDistributorIdentity({
    displayName: currentProfile.distributorName || user.outlet || user.name,
    displayArea: currentProfile.address || user.area || "",
  });
  document.getElementById("profileStatus").textContent = data.complete ? "Complete" : "Incomplete";
  document.getElementById("distributorName").value = currentProfile.distributorName || "";
  document.getElementById("address").value = currentProfile.address || "";
  document.getElementById("logoName").textContent = currentProfile.logoName || "Belum ada logo.";
  document.getElementById("stampName").textContent = currentProfile.stampName || "Belum ada stempel.";

  if(currentProfile.logoDataUrl) document.getElementById("logoPreview").src = currentProfile.logoDataUrl;
  if(currentProfile.stampDataUrl) document.getElementById("stampPreview").src = currentProfile.stampDataUrl;
}

document.getElementById("profileForm").addEventListener("submit", async function(event){
  event.preventDefault();
  const user = getStoredUser();
  const logoFile = document.getElementById("logo").files[0];
  const stampFile = document.getElementById("stamp").files[0];

  const payload = {
    userId: user.id,
    distributorName: document.getElementById("distributorName").value,
    address: document.getElementById("address").value,
    logoName: logoFile?.name || currentProfile?.logoName || "",
    logoDataUrl: logoFile ? await fileToDataUrl(logoFile) : currentProfile?.logoDataUrl || "",
    stampName: stampFile?.name || currentProfile?.stampName || "",
    stampDataUrl: stampFile ? await fileToDataUrl(stampFile) : currentProfile?.stampDataUrl || "",
  };

  const data = await apiRequest("/api/profile", {
    method: "PUT",
    body: JSON.stringify(payload),
  });

  currentProfile = data.profile;
  applyDistributorIdentity({
    displayName: currentProfile.distributorName,
    displayArea: currentProfile.address,
  });
  alert("Profile distributor berhasil disimpan.");
  window.location.href = "/menu%20utama.html";
});

loadProfile().catch((error) => alert(error.message));
</script>
</body>
</html>
